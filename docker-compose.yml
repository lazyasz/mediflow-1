version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=change_me_to_a_random_string_in_production
      - JWT_SECRET_KEY=change_me_to_a_random_string_in_production
      - DATABASE_URL=sqlite:////app/data/mediflow.db
    volumes:
      # Mount a volume for the SQLite database so it persists across container restarts
      - data_volume:/app/data

volumes:
  data_volume:
