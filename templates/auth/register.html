<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — MediFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="logo">
      <h1>Medi<span style="color:var(--accent)">Flow</span></h1>
      <p>Create your patient account</p>
    </div>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/auth/register">
      <div class="form-grid">
        <div class="form-group full">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="e.g. Rahul Sharma" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" name="phone" placeholder="10-digit number" />
        </div>
        <div class="form-group">
          <label>Age</label>
          <input type="number" name="age" placeholder="e.g. 35" min="0" max="120" />
        </div>
        <div class="form-group">
          <label>Hospital</label>
          <select name="hospital_id">
            {% for h in hospitals %}
            <option value="{{ h.id }}">{{ h.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group full">
          <label>Password</label>
          <input type="password" name="password" placeholder="Min 6 characters" required minlength="6" />
        </div>
      </div>
      <div style="margin-top:20px">
        <button type="submit" class="btn btn-accent btn-block btn-lg">Create Account →</button>
      </div>
    </form>

    <div class="auth-link">
      Already have an account? <a href="/auth/login">Sign in</a>
    </div>
  </div>
</div>
</body>
</html>
